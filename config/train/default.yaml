# configs/train.yaml
base:
  path: null

model:
  config: null
  init_model: null
  checkpoint: null
  freeze_layers: 0yy

data:
  name: null
  paths:
    - ${base.path}/input/tokenized/${model.config}/train/${data.name}
  limits:
    - 0

training:
  epochs: 1
  batch_size: 8
  learning_rate: 2e-4
  eval_strategy: "no"
  checkpoints_per_epoch: 50
  save_checkpoints_num: 5
  attn_implementation: "sdpa"

output:
  path: ${base.path}/output/${model.config}/${data.name}/test

hydra:
  run:
    dir: ${output.path}