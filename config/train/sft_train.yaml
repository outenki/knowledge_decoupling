# configs/train.yaml
base:
  path: /home/pj24001974/ku50001571/projects/knowledge_decoupling

model:
  config: null
  init_model: null
  checkpoint: null
  freeze_layers: 0

data:
  name: null
  paths:
    - ${base.path}/input/tokenized/${model.config}/sft/concat/${data.name}/train
  limits:
    - 0

training:
  epochs: 3
  batch_size: 8
  learning_rate: 5e-5
  eval_strategy: "no"
  checkpoints_per_epoch: 10
  save_checkpoints_num: 10
  attn_implementation: "sdpa"

output:
  path: ${model.init_model}-sft_${data.name}_train

hydra:
  run:
    dir: ${output.path}