# configs/train.yaml
base:
  path: null

model:
  config: meta-llama/Llama-3.2-1B
  init_model: null
  checkpoint: null
  freeze_layers: 0

data:
  name: SmolLM2-135M-20B-nonce-bs1024
  paths:
    - ${base.path}/input/tokenized/${model.config}/train/${data.name}
  limits:
    - 0

training:
  epochs: 1
  batch_size: 8
  learning_rate: 2e-4
  eval_strategy: "no"
  checkpoints_per_epoch: 10
  save_checkpoints_num: 10
  attn_implementation: "flash_attention_3"

output:
  path: ${base.path}/output/${model.config}/${data.name}

hydra:
  run:
    dir: ${output.path}